general.import = [
  "~/.config/alacritty/keys.toml",
  "~/.config/alacritty/theme.toml",
]

[terminal.shell]
program = "fish"
args = ["-l"]

[colors.cursor]
cursor = "0x00DDDD"

[font]
size = 15

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "Bold Italic"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[[mouse.bindings]]
action = "PasteSelection"
mouse = "Middle"

[window]
decorations = "Buttonless"

[window.padding]
x = 4
y = 4
